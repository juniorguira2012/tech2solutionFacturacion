version: '3.8'

services:
  # 1. BASE DE DATOS (PostgreSQL)
  postgres_db:
    image: postgres:15-alpine
    deploy:
      restart_policy:
        condition: any
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tech_two_solution_db
    volumes:
      - tech2_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  # 2. BACKEND (NestJS)
  backend:
    image: node:24-alpine
    deploy:
      restart_policy:
        condition: any
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech2-backend.rule=Host(`api.inventario.oneredrd.com`)"
      - "traefik.http.routers.tech2-backend.entrypoints=websecure"
      - "traefik.http.routers.tech2-backend.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.tech2-backend.loadbalancer.server.port=3000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      DATABASE_HOST: postgres_db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: tech_two_solution_db
    depends_on:
      - postgres_db

  # 3. FRONTEND (React + Vite + Tailwind)
  frontend:
    image: node:24-alpine
    deploy:
      restart_policy:
        condition: any
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tech2-frontend.rule=Host(`inventario.oneredrd.com`)"
      - "traefik.http.routers.tech2-frontend.entrypoints=websecure"
      - "traefik.http.routers.tech2-frontend.tls.certresolver=letsencryptresolver"
      - "traefik.http.services.tech2-frontend.loadbalancer.server.port=80"
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.inventario.oneredrd.com/products
    ports:
      - "8082:80"
    depends_on:
      - backend

volumes:
  tech2_db_data: