version: '3.8'

services:

  postgres_db:
    image: postgres:15-alpine

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - tech2_db_data:/var/lib/postgresql/data

    networks:
      - tech2-network

    deploy:
      restart_policy:
        condition: any

  backend:
    image: juniordone/tech2-backend:latest

    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres_db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}

    depends_on:
      - postgres_db

    networks:
      - tech2-network
      - network_public

    deploy:
      restart_policy:
        condition: any

      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.tech2-backend.rule=Host(`inventario.oneredrd.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.tech2-backend.entrypoints=websecure"
        - "traefik.http.routers.tech2-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.tech2-backend.loadbalancer.server.port=3000"

  frontend:
    image: juniordone/tech2-frontend:latest

    depends_on:
      - backend

    networks:
      - tech2-network
      - network_public

    deploy:
      restart_policy:
        condition: any

      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        - "traefik.http.routers.tech2-frontend.rule=Host(`inventario.oneredrd.com`)"
        - "traefik.http.routers.tech2-frontend.entrypoints=websecure"
        - "traefik.http.routers.tech2-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.tech2-frontend.loadbalancer.server.port=80"

volumes:
  tech2_db_data:

networks:
  tech2-network:
    driver: overlay

  network_public:
    external: true